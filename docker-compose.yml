services:
  doco-cd:
    container_name: doco-cd
    image: ghcr.io/kimdre/doco-cd:0.83.0
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      LOG_LEVEL: info
      POLL_CONFIG: |
        - url: https://github.com/ndi-ct/doco-cd.git
          reference: main
          interval: 180
